name: Build Release Only

on:
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: write

# Release/tag를 갱신 중인 실행을 중간에 취소하지 않음.
# 같은 브랜치의 rolling release를 동시에 수정하는 충돌을 피한다.
concurrency:
  group: inventory-touch-follow-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NDK_VERSION: 27.2.12479018
  MODULE_NAME: InventoryTouchFollowProbe

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27c and Ninja
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${NDK_VERSION}"
          sudo apt-get update
          sudo apt-get install -y ninja-build zip

      - name: Configure Android ARM64 Release build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build .so
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-android --parallel

      - name: Prepare Release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "build-android/lib${MODULE_NAME}.so" "dist/package/lib${MODULE_NAME}.so"
          cp README.md dist/package/README.md
          (cd dist/package && sha256sum "lib${MODULE_NAME}.so" > "lib${MODULE_NAME}.so.sha256")
          (cd dist/package && zip -9 "../${MODULE_NAME}-arm64-v8a.zip" "lib${MODULE_NAME}.so" "lib${MODULE_NAME}.so.sha256" README.md)
          cp "dist/package/lib${MODULE_NAME}.so" dist/
          cp "dist/package/lib${MODULE_NAME}.so.sha256" dist/

      - name: Publish only to rolling GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="continuous-${GITHUB_REF_NAME}"
          TITLE="${MODULE_NAME} continuous (${GITHUB_REF_NAME})"
          NOTES="Automatic ARM64 test build from commit ${GITHUB_SHA}. This is a JsonUI GameActivity input probe build; it logs mouse and touch motion events without changing Minecraft rendering or input."

          retry() {
            local tries=0
            local max=3
            until "$@"; do
              tries=$((tries + 1))
              if [ "$tries" -ge "$max" ]; then
                echo "Command failed after ${max} attempts: $*" >&2
                return 1
              fi
              echo "Temporary GitHub operation failure; retrying ($((tries + 1))/${max})..." >&2
              sleep $((tries * 5))
            done
          }

          if gh release view "$TAG" >/dev/null 2>&1; then
            # git push --force로 rolling tag를 이동시키면 GitHub가 가끔
            # 'remote: fatal error in commit_refs'를 반환한다.
            # 공식 Git reference API로 tag가 최신 커밋을 가리키게 갱신한다.
            retry gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true \
              --silent

            retry gh release upload "$TAG" \
              "dist/${MODULE_NAME}-arm64-v8a.zip" \
              "dist/lib${MODULE_NAME}.so" \
              "dist/lib${MODULE_NAME}.so.sha256" \
              --clobber

            retry gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease
          else
            # 태그/릴리즈가 아직 없으면 GitHub CLI가 현재 커밋에 새 태그를 생성한다.
            retry gh release create "$TAG" \
              "dist/${MODULE_NAME}-arm64-v8a.zip" \
              "dist/lib${MODULE_NAME}.so" \
              "dist/lib${MODULE_NAME}.so.sha256" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease
          fi
